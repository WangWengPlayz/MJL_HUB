# Render Blueprint (optional) — https://render.com/docs/blueprint-spec
# You can also skip this file and configure the service manually in the
# Render dashboard using the install/start commands below.
services:
  - type: web
    name: mjl-hub
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -k uvicorn.workers.UvicornWorker --workers 1 --threads 4 --bind 0.0.0.0:$PORT
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: PUBLIC_BASE_URL
        sync: false
    # NOTE: admin credentials are no longer set via env vars. On first boot
    # with an empty data/users.json, the app generates a random admin
    # username + password itself, hashes it, and prints the plaintext once
    # to the service logs (Render dashboard -> Logs) for you to capture.
    disk:
      name: mjl-hub-data
      mountPath: /opt/render/project/src/script
      sizeGB: 1
