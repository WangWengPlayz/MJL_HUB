<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<title>{% block title %}{{ site_name }}{% endblock %}</title>
<link rel="stylesheet" href="/static/css/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
</head>
<body>
<nav class="topbar">
  <a class="brand" href="/">
    <span class="brand-mark">⚡</span> <span>MJL<strong>HUB</strong></span>
    <span class="version-tag">{{ site_version }}</span>
  </a>
  <div class="nav-search">
    <input id="global-search" type="search" placeholder="Search scripts..." autocomplete="off">
    <div id="search-results" class="search-results hidden"></div>
  </div>
  <div class="nav-links">
    <a href="/#scripts">Scripts</a>
    <a href="/admin">Admin</a>
  </div>
</nav>
<main>
{% block back %}{% endblock %}
{% block content %}{% endblock %}
</main>
<footer>
  <span>MJL HUB &mdash; fully automated script hosting. Drop a <code>.js</code> file in <code>/script/</code> and it's live.</span>
  <span class="footer-credit">UI powered by <a href="https://github.com/SiriusSoftwareLtd/Rayfield" target="_blank" rel="noopener noreferrer">Rayfield UI</a></span>
  <span class="version-badge">{{ site_version }}</span>
</footer>
<div id="toast" class="toast hidden"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/lua.min.js"></script>
<script src="/static/js/common.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
